# Interval in milliseconds for flushing newly found IPs to the delta file.
# The delta file temporarily stores results very quickly to avoid frequent
# writes to the main result file. This reduces CPU and disk usage when the
# scanner finds many IPs in a short time.
delta_flush_interval = 2000

# Interval in milliseconds for merging the delta file into the main result file.
# During this step, the scanner merges and sorts the new IPs with the existing
# results. Since this operation is heavier, it runs less frequently than the
# delta flush.
merge_flush_interval = 5000

# Size of the internal channel used to pass discovered IPs from workers
# to the result writer. Larger values allow more buffering when the scanner
# produces results faster than they are written to disk.
chan_size = 4096

# Buffer size for file writing operations.
# Larger buffers can reduce the number of disk writes and improve performance
# when handling a large number of results.
buffer_size = 16384

