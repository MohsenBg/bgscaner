# Timeout in milliseconds to wait for an ICMP reply.
# If no response is received within this time, the target is considered unreachable.
timeout = 2000

# Number of concurrent worker goroutines sending ICMP probes.
# Increasing this value can significantly speed up scanning,
# but may increase CPU usage and network load.
workers = 100

# Prefix added to the output file name generated by this scanner.
# Helps distinguish results when multiple scanner types are used.
prefix_output = "icmp_"

# Shuffle the order of IPs before scanning.
# This distributes traffic more evenly and avoids sequential scanning patterns.
shuffle_ips = true

